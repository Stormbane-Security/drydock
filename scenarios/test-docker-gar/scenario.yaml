name: test-docker-gar
description: >
  Tests that Bosun's docker.yml reusable workflow successfully builds and pushes
  a container image to GCP Artifact Registry via Workload Identity Federation.

fixture:
  module: ../../fixtures/gcp-wif-test
  vars:
    project_id: stormbane-test
    region: us-central1
    github_org: stormbane-security
    github_repo: ci-testbed
    reusable_workflow_ref: stormbane-security/bosun/.github/workflows/docker.yml@refs/heads/main

backend:
  type: github-actions
  repo: stormbane-security/ci-testbed
  workflow: docker.yml
  ref: main
  inputs:
    registry: gar
    image: "${fixture.project_id}/ci-test/test-image"
    gcp-workload-identity-provider: "${fixture.wif_provider}"
    gcp-service-account: "${fixture.sa_email}"
    gar-location: "${fixture.gar_location}"
    trivy-enabled: "false"
    platforms: linux/amd64

timeout: 15m

assertions:
  - name: workflow succeeded
    type: github-run
    expect:
      conclusion: success

  - name: build job passed
    type: github-job
    expect:
      job: "Build, Scan & Push"
      conclusion: success

  - name: image exists in Artifact Registry
    type: command
    expect:
      command: "gcloud artifacts docker images list ${fixture.gar_repo} --project=${fixture.project_id} --format=value(package) --limit=1"
      stdout: test-image

  - name: WIF provider is active
    type: command
    expect:
      command: "gcloud iam workload-identity-pools providers describe ${fixture.wif_provider_id} --location=global --workload-identity-pool=${fixture.wif_pool_id} --project=${fixture.project_id} --format=value(state)"
      stdout: ACTIVE
