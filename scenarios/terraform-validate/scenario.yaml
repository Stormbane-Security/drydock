name: terraform-validate
description: >
  Validates Terraform configuration files without deploying them.
  Checks that the configuration parses, plans cleanly, and meets
  basic structural assertions. Use this for CI validation of AI-generated
  Terraform code before it reaches a real environment.
tags:
  - terraform
  - validation
  - ci

backend:
  type: terraform
  terraform_dir: ./tf
  auto_approve: false

timeout: 5m

commands:
  - name: terraform-fmt-check
    run: terraform fmt -check -recursive ./tf
    expect:
      exit_code: 0

  - name: terraform-validate
    run: |
      cd ./tf && terraform init -backend=false -input=false && terraform validate
    expect:
      exit_code: 0

assertions:
  - name: main-tf-exists
    type: file
    target: ./tf/main.tf
    expect:
      exists: true

  - name: no-hardcoded-credentials
    type: command
    expect:
      command: "grep -rn 'AKIA\\|password\\s*=\\s*\"[^\"]*\"\\|secret_key\\s*=\\s*\"[^\"]*\"' ./tf/ || true"
      exit_code: 0
      not_stdout: "AKIA"

  - name: encryption-configured
    type: file
    target: ./tf/main.tf
    expect:
      exists: true
      contains: "encryption"

artifacts:
  terraform_plan: true
