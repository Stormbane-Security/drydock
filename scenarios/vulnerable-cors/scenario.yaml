name: vulnerable-cors
description: >
  Deploys a web server with permissive CORS headers (Access-Control-Allow-Origin: *)
  and validates that Beacon correctly detects the misconfiguration.
tags:
  - beacon
  - cors
  - security

backend:
  type: compose
  compose_file: compose.yaml

timeout: 3m

commands:
  - name: wait-for-server
    run: |
      for i in $(seq 1 30); do
        curl -sf http://localhost:8090/health && exit 0
        sleep 1
      done
      exit 1

  - name: check-cors-header
    run: |
      curl -s -H "Origin: https://evil.com" http://localhost:8090/ -D - | head -20
    expect:
      exit_code: 0
      stdout: "Access-Control-Allow-Origin: *"

assertions:
  - name: server-is-running
    type: port
    target: "localhost:8090"
    expect:
      open: true

  - name: cors-wildcard-present
    type: http
    target: http://localhost:8090/
    expect:
      status: 200
      header: Access-Control-Allow-Origin
      header_value: "*"

  - name: no-csp-header
    type: http
    target: http://localhost:8090/
    expect:
      status: 200

artifacts:
  container_logs: true
