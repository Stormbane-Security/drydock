name: test-docker-gar-denied
description: >
  Negative test: verifies that a workflow run WITHOUT the correct OIDC claims
  (wrong environment, direct workflow instead of reusable) is denied by the
  WIF attribute condition. The workflow should fail during GCP authentication.

fixture:
  module: ../../fixtures/gcp-wif-test
  vars:
    project_id: stormbane-test
    region: us-central1
    github_org: stormbane-security
    github_repo: ci-testbed
    # Restrict to a specific environment that the test workflow won't use.
    environment: production
    reusable_workflow_ref: stormbane-security/bosun/.github/workflows/docker.yml@refs/heads/main

backend:
  type: github-actions
  repo: stormbane-security/ci-testbed
  # This workflow calls docker.yml WITHOUT specifying the "production" environment,
  # so the OIDC token's environment claim won't match the WIF condition.
  workflow: docker-no-env.yml
  ref: main
  inputs:
    registry: gar
    image: "${fixture.project_id}/ci-test/denied-image"
    gcp-workload-identity-provider: "${fixture.wif_provider}"
    gcp-service-account: "${fixture.sa_email}"
    gar-location: "${fixture.gar_location}"
    trivy-enabled: "false"
    platforms: linux/amd64

timeout: 15m

assertions:
  - name: workflow failed due to auth denial
    type: github-run
    expect:
      conclusion: failure

  - name: denied image was NOT pushed
    type: command
    expect:
      command: "gcloud artifacts docker images list ${fixture.gar_repo} --project=${fixture.project_id} --format=value(package) 2>&1 | grep -c denied-image || echo 0"
      stdout: "0"
